<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XKit: Manage tag bundles</title>
    <link rel="stylesheet" href="/lib/modern-normalize.css">
    <link rel="stylesheet" href="/lib/remixicon/remixicon.css">
    <link rel="stylesheet" href="/action/acorn.css">
    <link rel="stylesheet" href="index.css">
    <script defer src="/action/resize_frames.js"></script>
    <script defer src="/browser_polyfill.js"></script>
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <main>
      <section>
        <h3 id="new-bundle-heading">Add new tag bundle</h3>
        <form id="new-bundle" aria-labelledby="new-bundle-heading">
          <label for="new-bundle-title">Title</label>
          <input id="new-bundle-title" name="title" type="text" autocomplete="off" placeholder="My tag bundle" required>
          <label for="new-bundle-tags">Tags</label>
          <input id="new-bundle-tags" name="tags" type="text" autocomplete="off" placeholder="tag1, tag2, tag3" required>
          <fieldset>
            <button type="submit" class="primary">Add bundle</button>
          </fieldset>
        </form>
      </section>
      <section>
        <h3>Your tag bundles</h3>
        <ul id="bundles"></ul>
      </section>
    </main>
    <template id="bundle-template">
      <li class="bundle">
        <button class="drag-handle" title="Drag to rearrange">
          <figure class="acorn-icons" aria-hidden="true">
            <!-- https://mozilla.org/MPL/2.0/ | https://github.com/mozilla-firefox/firefox/blob/5151f62/toolkit/themes/shared/icons/move-16.svg -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M7 14H5v-2h2v2zM11 14H9v-2h2v2zM7 9H5V7h2v2zM11 9H9V7h2v2zM7 4H5V2h2v2zM11 2v2H9V2h2z"/>
            </svg>
          </figure>
        </button>
        <div>
          <input class="title" type="text" disabled required>
          <input class="tags" type="text" disabled required>
        </div>
        <span class="controls">
          <button class="edit" title="Edit tag bundle"><i class="ri-pencil-line"></i></button>
          <button class="delete" title="Delete tag bundle"><i class="ri-delete-bin-line"></i></button>
        </span>
      </li>
    </template>
  </body>
</html>
